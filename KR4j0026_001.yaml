body:
  text: 無住詞宋陳與義撰法駕導引世傳頃年都下市肆中有道人攜烏衣稚髻女子買酒獨飲女子歌詞以侑凡九闋皆非人世語或記之以問一道士道士驚曰此赤城韓夫人所製水府蔡真君法駕導引也烏衣女子疑龍云得其三而亡其二擬作三闋朝元路朝元路同駕玉華君千乘載花紅一色人間遙指是祥雲回望海光新又東風起東風起海上百花搖十八風鬟雲半動飛花和雨著輕綃歸路碧迢迢又煙漠漠煙漠漠天淡一簾秋自洗玉舟斟白醴月華微映是空舟歌罷海西流虞美人亭下桃花盛開作長短句詠之十年花底承朝露看到江南樹洛陽城裏乂東風未必桃花得似舊時紅胭脂睡起春才好應恨人空老心情雖在只吟詩白髮劉郎孤負可憐枝憶秦娥五日移舟明山下作魚龍舞湘君欲下瀟湘浦瀟湘浦興亡離合亂波平楚獨無尊酒酬端午移舟來聽明山雨明山雨白頭孤客洞庭懷古臨江仙前題高詠楚詞酬午日天涯節序匆匆榴花不似舞裙紅無人知此意歌罷滿簾風萬事一身傷老矣戎葵凝笑墻東酒杯深淺去年同試澆橋下水今夕到湘中虞美人大光祖席醉中賦長短句張帆欲去仍搔首更醉君家酒吟詩日日待春風及至桃花開後却匆匆歌聲頻為行人咽記著尊前雪明朝酒醒大江流滿載一船離恨向衡州㸃絳脣紫陽寒食寒食今年紫陽山下蠻江左竹籬烟鎖何處求新火不解鄉音只怕人嫌我愁無奈短歌誰和風動梨花朵虞美人邢上友㑹上超然堂上閒賓主不受人間暑氷盤圍坐此州無却有一瓶和露玉芙蕖亭亭風骨涼生牖消盡尊中酒酒䦨明月轉城西照見紗巾藜杖帶香歸漁家傲福建道中今日山頭雲欲舉青蛟素鳯移時舞行到石橋聞細雨聽還住風吹却過溪西去我欲尋詩寬久旅桃花落盡春無所渺渺籃輿穿翠楚悠然處高林忽送黃鸝語虞美人余甲寅嵗自春官出守湖州秋杪道中荷花無復存者乙卯嵗自瑣闥以病得請奉祠卜居青墩鎮立秋後三日行舟之前後如朝霞相映望之不斷也以長短句記之扁舟三日秋塘路平度荷花去病夫因病得來遊更值滿川微雨洗新秋去年長恨拏舟晚空見殘荷滿今年何以報君恩一路繁花相送到青墩浣溪沙離杭日梁仲謀惠酒極清而美七月十二日晚卧小閣巳而月上獨酌送了棲鴉復暮鐘欄干生影曲屏東卧看孤鶴駕天風起舞一樽明月下秋空如水酒如空謫仙已去與誰同玉樓春青墩僧舍作山人本合居巖嶺聊問支郎分半境殘年藜杖與綸巾八尺庭中時㺯影呼兒汲水添茶鼎甘勝吳山山下井一甌清露一爐雲偏覺平生今日永清平樂朩犀黃衫相倚翠葆層層底八月江南風日美㺯影山腰水尾楚人未識孤妍離騷遺恨千年無住菴中新事一枝喚起幽禪定風波九日登高有故常隨晴隨雨一傳觴多病題詩無好句孤負黃花今日十分黃記得眉山文翰老曾道四時佳節是重陽江海滿前懷古意誰㑹闌干三撫獨凄涼菩薩鬘荷花南軒面對芙蓉浦宜風宜月還宜雨紅少緑多時簾前光景奇繩牀烏朩几盡日繁香裏睡起一篇新與花為主人南柯子塔院僧閣矯矯千年鶴茫茫萬里風闌干三面看秋空背插浮屠千尺冷煙中林塢村村暗溪流處處通此間何似玉霄峰遙望蓬萊依約曉雲東臨江仙夜登小閣憶洛中舊遊憶昔午橋橋上飲坐中多是豪英長溝流月去無聲杏花疏影裏吹笛到天明二十餘年如一夢此身雖在堪驚閒登小閣看新晴古今多少事漁唱起三更無住詞
