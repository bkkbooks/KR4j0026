body:
  text: 提要無住詞詞曲類一詞集之屬臣等謹案無住詞一卷宋陳與義撰與義有簡齋集别著録陳振孫書録解題載其無住詞一卷以所居有無住菴故以名之與義詩師老杜當時稱陳黃之後無逾之者其詞不多且無長調而語意超絶黃升花菴詞選稱其可摩坡仙之壘至於虞美人之及至桃花開後却匆匆臨江山之杏花疏影裏吹笛到天眀等句胡仔漁隱叢話亦稱其清婉竒麗蓋當時亦絶重其詞也此本為毛晉所刋僅十八闋而吐言天拔不作栁嚲鶯嬌之態亦無蔬筍之氣殆于首首可傳不能以篇帙之少而廢之方回瀛奎律髓稱杜甫為一祖而以黃庭堅陳師道及與義為三宗如以詞論則師道為勉強學步庭堅為利鈍互陳皆迥非與義之敵矣開卷法駕導引三闋與義已自注其詞為擬作而諸家題本尚有稱為赤城韓夫人所製列之仙鬼類中者證以本集亦足訂小説之誣焉潄玉詞詞曲類一詞集之屬臣等謹案潄玉詞一卷宋李清照撰清照號易安居士濟南人禮部郎提點京東刑獄格非之女湖州守趙眀誠之妻也清照工詩文尢以詞擅名胡仔苕溪漁隱叢話稱其再適張汝舟未幾反目有啓事上綦處厚云猥以桑榆之晚景配兹駔儈之下材傳者無不笑之今其啓具載趙彥衛雲麓漫抄中李心傳建炎以來繫年要録載其與後夫搆訟事尤詳此本為毛晉汲古閣所刋卷末備載其軼事逸文而不録此篇蓋諱之也案陳振孫書録解題載清照潄玉詞一卷又云别本作五卷黃升花菴詞選則稱潄玉詞三卷今皆不傳此本僅詞十七闋附以金石録序一篇蓋後人裒輯為之已非其舊其金石録後序與刻本所載詳略迥殊蓋從容齋五筆中抄出亦非完篇也清照以一婦人而詞格乃抗佚周栁上張端義貴耳集極推其元宵詞永過樂秋詞聲聲慢以為閨閣有此文筆殆為間氣良非虛美雖篇帙無多固不能不寶而存之為詞家一大宗矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:069b32533753d1264671759ab72f594080d6139542e8e1f06a8e1a8c5f9c62f9
